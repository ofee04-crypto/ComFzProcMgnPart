<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments/nav :: head('合約統計')}"></head>
  <body>
    <div th:replace="~{fragments/nav :: navbar}"></div>

    <div class="container mt-4">
      <h2 class="mb-4">合約資料統計</h2>

      <div class="table-responsive">
        <table class="table table-bordered table-hover mt-3">
          <thead class="table-info">
            <tr>
              <th class="text-center">操作</th>
              <th>合約編號</th>
              <th>合約名稱</th>
              <th class="text-end">關聯案件數</th>
              <th class="text-end">合約金額</th>
              <th class="text-end">合約餘額</th>
              <th class="text-end">累計花費時數</th>
              <th class="text-end">累計費用</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="stat : ${groupedStats}">
              <td class="text-center">
                <a
                  th:href="@{/(keyword=${stat.contractNo})}"
                  class="btn btn-sm btn-outline-primary"
                  >詳細</a
                >
              </td>
              <td th:text="${stat.contractNo}"></td>
              <td th:text="${stat.appName}"></td>
              <td class="text-end" th:text="${stat.count}"></td>
              <td
                class="text-end"
                th:text="${stat.contractAmount != null ? #numbers.formatDecimal(stat.contractAmount, 1, 'COMMA', 1, 'POINT') : ''}"
              ></td>
              <td
                class="text-end"
                th:text="${stat.contractBalance != null ? #numbers.formatDecimal(stat.contractBalance, 1, 'COMMA', 1, 'POINT') : ''}"
                th:style="${stat.contractBalance < 0 ? 'color: red; font-weight: bold;' : (stat.contractBalance <= 10000 ? 'color: #fd7e14; font-weight: bold;' : '')}"
              ></td>
              <td
                class="text-end"
                th:text="${stat.totalActualHours != null ? #numbers.formatDecimal(stat.totalActualHours, 1, 'COMMA', 1, 'POINT') : ''}"
              ></td>
              <td
                class="text-end"
                th:text="${stat.totalFee != null ? #numbers.formatDecimal(stat.totalFee, 1, 'COMMA', 1, 'POINT') : ''}"
              ></td>
            </tr>
            <tr th:if="${#lists.isEmpty(groupedStats)}">
              <td colspan="8" class="text-center">目前無案件資料可供彙整</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
