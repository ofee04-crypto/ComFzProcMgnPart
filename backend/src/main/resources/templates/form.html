<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments/nav :: head('案件詳細資料')}"></head>

  <body>
    <div th:replace="~{fragments/nav :: navbar}"></div>

    <div class="container mt-4 mb-5">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 th:text="${isEdit ? '案件詳細資料' : '新增案件'}">案件詳細資料</h2>
        <!-- 編輯模式下顯示編輯按鈕 -->
        <button
          type="button"
          class="btn btn-warning fw-bold"
          th:if="${isEdit}"
          id="editBtn"
          onclick="enableEdit()"
        >
          編輯
        </button>
      </div>

      <hr class="mt-1 mb-1 border-secondary" />
      <form
        th:action="@{/save}"
        th:object="${patentCase}"
        method="post"
        class="row g-3"
        id="caseForm"
      >
        <input type="hidden" th:field="*{eventNo}" />

        <div class="col-md-3">
          <label class="form-label fw-bold text-danger">合約編號 (必填)</label>
          <input
            type="text"
            class="form-control lockable border-danger-subtle"
            th:field="*{contractNo}"
            required
          />
        </div>

        <div class="col-md-6">
          <label class="form-label fw-bold">合約名稱</label>
          <input
            type="text"
            class="form-control lockable"
            th:field="*{appName}"
          />
        </div>
        <div class="col-md-3">
          <label class="form-label fw-bold">申請人</label>
          <input
            type="text"
            class="form-control lockable"
            th:field="*{applicant}"
          />
        </div>

        <div class="col-md-12">
          <label class="form-label fw-bold">合約備註</label>
          <textarea
            class="form-control lockable"
            th:field="*{contractNotes}"
            rows="2"
          ></textarea>
        </div>

        <div class="col-md-2">
          <label class="form-label fw-bold">合約金額-NTD</label>
          <input
            type="number"
            step="0.01"
            class="form-control lockable"
            th:field="*{contractAmount}"
          />
        </div>
        <div class="col-md-2">
          <label class="form-label fw-bold">合約總時數-hrs</label>
          <input
            type="number"
            step="0.01"
            class="form-control lockable"
            th:field="*{totalContractHours}"
          />
        </div>
        <div class="col-md-2">
          <label class="form-label fw-bold text-success"
            >小時費用-NTD(自動)</label
          >
          <input
            type="number"
            step="0.01"
            class="form-control lockable"
            th:field="*{hourlyRate}"
            readonly
            style="background-color: #f8f9fa"
          />
        </div>

        <hr class="mt-4 mb-1 border-secondary" />

        <div class="col-md-3">
          <label class="form-label fw-bold text-danger">案件/檔案編號</label>
          <input
            type="text"
            class="form-control lockable border-danger-subtle"
            th:field="*{caseFileNo}"
            placeholder="合約母案請輸入A"
            required
          />
        </div>
        <!-- <div class="col-md-6">
          <label class="form-label fw-bold">案件名稱</label>
          <input
            type="text"
            class="form-control lockable"
            th:field="*{originalCaseName}"
          />
        </div> -->

        <!-- <div class="col-md-6">
          <label class="form-label fw-bold">申請案名稱(英)</label>
          <input
            type="text"
            class="form-control lockable"
            th:field="*{appNameEn}"
          />
        </div> -->

        <div class="col-md-6">
          <label class="form-label fw-bold">任務名稱</label>
          <input
            type="text"
            class="form-control lockable"
            th:field="*{taskName}"
          />
        </div>

        <div class="col-md-3">
          <label class="form-label fw-bold">承辦人</label>
          <input
            type="text"
            class="form-control lockable"
            th:field="*{assignee}"
          />
        </div>
        <div class="col-md-12">
          <label class="form-label fw-bold">工作項目簡述</label>

          <textarea
            class="form-control lockable"
            th:field="*{taskDescription}"
            rows="2"
          ></textarea>
        </div>

        <!-- <div class="col-md-12">
          <label class="form-label fw-bold">費用說明</label>
          <textarea
            class="form-control lockable"
            th:field="*{feeDescription}"
            rows="2"
          ></textarea>
        </div> -->

        <div class="col-md-2">
          <label class="form-label fw-bold">委派日期</label>
          <input
            type="date"
            class="form-control lockable"
            th:field="*{assignmentDate}"
          />
        </div>

        <div class="col-md-2">
          <label class="form-label fw-bold">預計完成日</label>
          <input
            type="date"
            class="form-control lockable"
            th:field="*{expectedCompletionDate}"
          />
        </div>

        <div class="col-md-2">
          <label class="form-label fw-bold">預計使用時數-hrs</label>
          <input
            type="number"
            step="0.01"
            class="form-control lockable"
            th:field="*{expectedHours}"
          />
        </div>
        <div class="col-md-2">
          <label class="form-label fw-bold text-primary">實際完成日</label>
          <input
            type="date"
            class="form-control lockable border-primary-subtle"
            th:field="*{actualCompletionDate}"
          />
        </div>
        <div class="col-md-2">
          <label class="form-label fw-bold text-primary"
            >實際使用時數-hrs</label
          >
          <input
            type="number"
            step="0.01"
            class="form-control lockable border-primary-subtle"
            th:field="*{actualHours}"
          />
        </div>
        <div class="col-md-2">
          <label class="form-label fw-bold text-success"
            >時數費用-NTD(自動)</label
          >
          <input
            type="number"
            step="0.01"
            class="form-control lockable border-success-subtle"
            th:field="*{hoursFee}"
            readonly
            style="background-color: #f8f9fa"
          />
        </div>

        <div class="col-md-2">
          <label class="form-label fw-bold">事件費用-NTD</label>
          <input
            type="number"
            step="0.01"
            class="form-control lockable"
            th:field="*{eventFee}"
          />
        </div>

        <div class="col-md-2">
          <label class="form-label fw-bold text-success"
            >總費用-NTD(自動)</label
          >
          <input
            type="number"
            step="0.01"
            class="form-control lockable border-success-subtle"
            th:field="*{totalFee}"
            readonly
            style="background-color: #f8f9fa"
          />
        </div>

        <div class="col-md-12">
          <label class="form-label fw-bold">任務備註</label>
          <textarea
            class="form-control lockable"
            th:field="*{notes}"
            rows="3"
          ></textarea>
        </div>

        <div class="col-12 mt-4 d-flex justify-content-end gap-2">
          <!-- 返回與儲存按鈕 -->
          <a href="/" class="btn btn-secondary">返回列表</a>
          <button type="submit" class="btn btn-success" id="saveBtn">
            儲存變更
          </button>
        </div>
      </form>
    </div>

    <script th:inline="javascript">
      const isEdit = /*[[${isEdit}]]*/ false;
      const contractsJsonData =
        /*[[${contractsJson != null ? contractsJson : '{}'}]]*/ "{}";

      // 自動計算各項費用
      function calculateAllFees() {
        const amountStr = document.getElementById("contractAmount").value;
        const hoursStr = document.getElementById("totalContractHours").value;
        const actHoursStr = document.getElementById("actualHours").value;
        const eventFeeStr = document.getElementById("eventFee").value;

        const rateInput = document.getElementById("hourlyRate");
        const hoursFeeInput = document.getElementById("hoursFee");
        const totalFeeInput = document.getElementById("totalFee");

        // 1. 小時費用
        let hourlyRateVal = 0;
        if (amountStr && hoursStr) {
          const amount = parseFloat(amountStr);
          const hours = parseFloat(hoursStr);
          if (hours !== 0 && !isNaN(amount) && !isNaN(hours)) {
            hourlyRateVal = Math.round((amount / hours) * 10) / 10;
            rateInput.value = hourlyRateVal;
          } else {
            rateInput.value = "";
          }
        } else {
          rateInput.value = "";
        }

        // 2. 時數費用 = 實際使用時數 * 小時費用
        let hoursFeeVal = 0;
        if (actHoursStr && rateInput.value) {
          const actualHrs = parseFloat(actHoursStr);
          if (!isNaN(actualHrs)) {
            hoursFeeVal = Math.round(actualHrs * hourlyRateVal * 100) / 100;
            hoursFeeInput.value = hoursFeeVal;
          } else {
            hoursFeeInput.value = "";
          }
        } else {
          hoursFeeInput.value = "";
        }

        // 3. 總費用 = 時數費用 + 事件費用
        let totalFeeVal = 0;
        let hasFee = false;

        if (hoursFeeInput.value !== "") {
          totalFeeVal += parseFloat(hoursFeeInput.value);
          hasFee = true;
        }

        if (eventFeeStr) {
          const evtFee = parseFloat(eventFeeStr);
          if (!isNaN(evtFee)) {
            totalFeeVal += evtFee;
            hasFee = true;
          }
        }

        if (hasFee) {
          totalFeeInput.value = Math.round(totalFeeVal * 100) / 100;
        } else {
          totalFeeInput.value = "";
        }
      }

      document.addEventListener("DOMContentLoaded", function () {
        // 綁定所有會影響費用的輸入事件
        const inputs = [
          "contractAmount",
          "totalContractHours",
          "actualHours",
          "eventFee",
        ];
        inputs.forEach((id) => {
          const el = document.getElementById(id);
          if (el) el.addEventListener("input", calculateAllFees);
        });

        // 新增案件時：建立可查詢的滾動下拉選單與自動代入邏輯
        if (!isEdit && contractsJsonData && contractsJsonData !== "{}") {
          try {
            const contractsMap = JSON.parse(contractsJsonData);
            const contractInput = document.getElementById("contractNo");

            // 建立 datalist 作為下拉搜尋清單
            let datalist = document.createElement("datalist");
            datalist.id = "contractNoList";
            Object.keys(contractsMap).forEach((cNo) => {
              let option = document.createElement("option");
              option.value = cNo;
              datalist.appendChild(option);
            });
            document.body.appendChild(datalist);
            contractInput.setAttribute("list", "contractNoList");

            // 監聽合約編號輸入變更
            contractInput.addEventListener("input", function () {
              const selectedNo = contractInput.value;
              if (contractsMap[selectedNo]) {
                const data = contractsMap[selectedNo];
                if (document.getElementById("appName") && data.appName)
                  document.getElementById("appName").value = data.appName;
                if (document.getElementById("applicant") && data.applicant)
                  document.getElementById("applicant").value = data.applicant;
                if (
                  document.getElementById("contractNotes") &&
                  data.contractNotes
                )
                  document.getElementById("contractNotes").value =
                    data.contractNotes;
                if (
                  document.getElementById("contractAmount") &&
                  data.contractAmount
                )
                  document.getElementById("contractAmount").value =
                    data.contractAmount;
                if (
                  document.getElementById("totalContractHours") &&
                  data.totalContractHours
                )
                  document.getElementById("totalContractHours").value =
                    data.totalContractHours;

                // 自動重算各項費用
                calculateAllFees();
              }
            });
          } catch (e) {
            console.error("無法解析歷史合約資料", e);
          }
        }

        if (isEdit) {
          // 如果是現有資料的檢視模式，鎖定所有帶有 lockable class 的輸入框並隱藏儲存按鈕
          document.querySelectorAll(".lockable").forEach((el) => {
            el.disabled = true;
            el.classList.add("bg-light");
          });
          document.getElementById("saveBtn").style.display = "none";
        }
      });

      // 點擊「編輯」按鈕後觸發
      function enableEdit() {
        document.querySelectorAll(".lockable").forEach((el) => {
          el.disabled = false;
          el.classList.remove("bg-light");
        });
        document.getElementById("saveBtn").style.display = "inline-block";
        document.getElementById("editBtn").style.display = "none"; // 隱藏編輯按鈕

        // 將焦點自動移到第一個輸入框
        const firstInput = document.querySelector(".lockable");
        if (firstInput) firstInput.focus();
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
