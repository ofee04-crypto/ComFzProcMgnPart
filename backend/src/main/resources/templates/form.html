<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments/nav :: head('事件資料管理')}"></head>

  <body>
    <div th:replace="~{fragments/nav :: navbar}"></div>

    <div class="container mt-4 mb-5">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h2
            th:text="${isEdit ? '事件詳細資料' : '新增案件'}"
            class="d-inline"
          >
            事件詳細資料
          </h2>
          <!-- 合約餘額顯示 -->
          <span
            id="balanceDisplay"
            class="ms-3 badge bg-primary-subtle text-dark border border-primary-subtle fw-bold"
            style="font-size: 1rem; vertical-align: middle; display: none"
          ></span>
        </div>

        <!-- 新約/續約按鈕 -->

        <button
          type="button"
          class="btn btn-primary fw-bold"
          id="renewBtn"
          onclick="handleRenew()"
          th:if="${!isEdit}"
        >
          <i class="bi bi-arrow-repeat"></i> 新約/續約
        </button>

        <!-- 詳細資料模式下顯示編輯按鈕 -->
        <button
          type="button"
          class="btn btn-warning fw-bold"
          th:if="${isEdit}"
          id="editBtn"
          onclick="enableEdit()"
        >
          編輯
        </button>
      </div>

      <hr class="mt-1 mb-1 border-secondary" />
      <form
        th:action="@{/save}"
        th:object="${patentCase}"
        method="post"
        class="row g-3"
        id="caseForm"
      >
        <input type="hidden" th:field="*{eventNo}" />

        <div class="col-md-3">
          <label class="form-label fw-bold text-danger">合約編號 (必填)</label>
          <input
            type="text"
            class="form-control lockable border-danger-subtle"
            th:field="*{contractNo}"
            placeholder="合約PTS案號"
            required
          />
        </div>

        <div class="col-md-6">
          <label class="form-label fw-bold">合約名稱</label>
          <input
            type="text"
            class="form-control lockable"
            th:field="*{appName}"
          />
        </div>
        <div class="col-md-3">
          <label class="form-label fw-bold">客戶名稱</label>
          <input
            type="text"
            class="form-control lockable"
            th:field="*{applicant}"
          />
        </div>

        <div class="col-md-12">
          <label class="form-label fw-bold">合約備註</label>
          <textarea
            class="form-control lockable"
            th:field="*{contractNotes}"
            rows="1"
          ></textarea>
        </div>

        <div class="col-md-2">
          <label class="form-label fw-bold">合約單價-NTD</label>
          <input
            type="number"
            step="1"
            class="form-control lockable"
            th:field="*{contractUnitPrice}"
            style="background-color: #f8f9fa"
            readonly
          />
        </div>
        <div class="col-md-2">
          <label class="form-label fw-bold">合約總時數-hrs</label>
          <input
            type="number"
            step="1"
            class="form-control lockable"
            th:field="*{totalContractHours}"
            style="background-color: #f8f9fa"
            readonly
          />
        </div>

        <div class="col-md-2">
          <label class="form-label fw-bold">合約原額-NTD</label>
          <input
            type="number"
            step="1"
            class="form-control lockable"
            th:field="*{contractAmount}"
            style="background-color: #f8f9fa"
            readonly
          />
        </div>
        <!-- 隱藏欄位儲存初始餘額 -->
        <input
          type="hidden"
          th:field="*{contractBalance}"
          id="contractBalance"
        />
        <!-- 隱藏欄位儲存初始餘額 -->
        <div class="col-md-2">
          <label class="form-label fw-bold text-success"
            >小時費用-NTD(自動)</label
          >
          <input
            type="number"
            step="1"
            class="form-control lockable"
            th:field="*{hourlyRate}"
            readonly
            style="background-color: #f8f9fa"
          />
        </div>

        <hr class="mt-4 mb-1 border-secondary" />
        <div class="bg-secondary-subtle p-3 rounded border mb-3">
          <div class="d-flex align-items-center justify-content-between">
            <h5 class="fw-bold text-dark mb-0">
              <i class="bi bi-currency-dollar me-2"></i
              >合約憑證-新增母案時必填，依PTS資料建立
            </h5>
            <button
              class="btn btn-sm btn-warning collapsed"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#receiptsSection"
              aria-expanded="false"
              aria-controls="receiptsSection"
            >
              <i class="bi bi-arrows-expand"></i> 收合/展開
            </button>
          </div>

          <div class="collapse" id="receiptsSection">
            <div class="row g-3 mt-1">
              <!-- 4. 收款與憑證 -->
              <div class="col-md-3">
                <label class="form-label fw-bold">請款單號</label>
                <input
                  type="text"
                  class="form-control lockable"
                  th:field="*{invoiceRequestNo}"
                />
              </div>
              <div class="col-md-3">
                <label class="form-label fw-bold">實際收款</label>
                <input
                  type="number"
                  step="1"
                  class="form-control lockable"
                  th:field="*{actualReceived}"
                />
              </div>
              <div class="col-md-6"></div>
              <div class="col-md-3">
                <label class="form-label fw-bold">收據日期</label>
                <input
                  type="date"
                  class="form-control lockable"
                  th:field="*{receiptDate}"
                />
              </div>
              <div class="col-md-3">
                <label class="form-label fw-bold">收款日期</label>
                <input
                  type="date"
                  class="form-control lockable"
                  th:field="*{paymentReceivedDate}"
                />
              </div>
              <div class="col-md-1">
                <label class="form-label fw-bold">已收款</label>
                <select class="form-select lockable" th:field="*{isWithheld}">
                  <option value="否">否</option>
                  <option value="是">是</option>
                </select>
              </div>

              <div class="col-md-5"></div>
              <div class="col-md-3">
                <label class="form-label fw-bold">發票日期</label>
                <input
                  type="date"
                  class="form-control lockable"
                  th:field="*{invoiceDate}"
                />
              </div>

              <div class="col-md-3">
                <label class="form-label fw-bold">發票號碼</label>
                <input
                  type="text"
                  class="form-control lockable"
                  th:field="*{invoiceNo}"
                />
              </div>
              <!-- <div class="col-md-3">
          <label class="form-label fw-bold">立帳傳票號碼</label>
          <input
            type="text"
            class="form-control lockable"
            th:field="*{voucherNo}"
          />
        </div> -->

              <div class="col-md-12">
                <label class="form-label fw-bold">請款備註</label>
                <textarea
                  class="form-control lockable"
                  th:field="*{invoiceNote}"
                  rows="1"
                ></textarea>
              </div>
            </div>
          </div>
        </div>

        <hr class="mt-1 mb-1 border-secondary" />
        <h5 class="fw-bold text-dark mb-0">
          <i class="bi bi-currency-dollar me-2"></i>事件資料
        </h5>
        <div class="col-md-3">
          <label class="form-label fw-bold text-danger">案件/檔案編號</label>
          <input
            type="text"
            class="form-control lockable border-danger-subtle"
            th:field="*{caseFileNo}"
            placeholder="母案自動, IP事件填案號, 其他自訂"
            required
          />
        </div>
        <!-- <div class="col-md-6">
          <label class="form-label fw-bold">案件名稱</label>
          <input
            type="text"
            class="form-control lockable"
            th:field="*{originalCaseName}"
          />
        </div> -->

        <!-- <div class="col-md-6">
          <label class="form-label fw-bold">申請案名稱(英)</label>
          <input
            type="text"
            class="form-control lockable"
            th:field="*{appNameEn}"
          />
        </div> -->

        <div class="col-md-6">
          <label class="form-label fw-bold">任務名稱</label>
          <input
            type="text"
            class="form-control lockable"
            th:field="*{taskName}"
          />
        </div>

        <div class="col-md-3">
          <label class="form-label fw-bold">承辦人</label>
          <input
            type="text"
            class="form-control lockable"
            th:field="*{assignee}"
          />
        </div>
        <div class="col-md-12">
          <label class="form-label fw-bold">工作項目簡述</label>

          <textarea
            class="form-control lockable"
            th:field="*{taskDescription}"
            rows="1"
          ></textarea>
        </div>

        <!-- <div class="col-md-12">
          <label class="form-label fw-bold">費用說明</label>
          <textarea
            class="form-control lockable"
            th:field="*{feeDescription}"
            rows="2"
          ></textarea>
        </div> -->

        <div class="col-md-2">
          <label class="form-label fw-bold">委派日期</label>
          <input
            type="date"
            class="form-control lockable"
            th:field="*{assignmentDate}"
          />
        </div>

        <div class="col-md-2">
          <label class="form-label fw-bold">預計完成日</label>
          <input
            type="date"
            class="form-control lockable"
            th:field="*{expectedCompletionDate}"
          />
        </div>

        <div class="col-md-2">
          <label class="form-label fw-bold">預計使用時數-hrs</label>
          <input
            type="number"
            step="1"
            class="form-control lockable"
            th:field="*{expectedHours}"
          />
        </div>
        <div class="col-md-2">
          <label class="form-label fw-bold text-primary">實際完成日</label>
          <input
            type="date"
            class="form-control lockable border-primary-subtle"
            th:field="*{actualCompletionDate}"
          />
        </div>
        <div class="col-md-2">
          <label class="form-label fw-bold text-primary"
            >實際使用時數-hrs</label
          >
          <input
            type="number"
            step="1"
            class="form-control lockable border-primary-subtle"
            th:field="*{actualHours}"
          />
        </div>
        <div class="col-md-2">
          <label class="form-label fw-bold text-success"
            >時數費用-NTD(自動)</label
          >
          <input
            type="number"
            step="1"
            class="form-control lockable border-success-subtle"
            th:field="*{hoursFee}"
            readonly
            style="background-color: #f8f9fa"
          />
        </div>

        <div class="col-md-2">
          <label class="form-label fw-bold">事件費用-NTD</label>
          <input
            type="number"
            step="1"
            class="form-control lockable"
            th:field="*{eventFee}"
          />
        </div>

        <div class="col-md-2">
          <label class="form-label fw-bold text-success"
            >總費用-NTD(自動)</label
          >
          <input
            type="number"
            step="1"
            class="form-control lockable border-success-subtle"
            th:field="*{totalFee}"
            readonly
            style="background-color: #f8f9fa"
          />
        </div>

        <div class="col-md-2">
          <label class="form-label fw-bold text-success">結餘-NTD(自動)</label>
          <input
            type="number"
            step="1"
            class="form-control lockable border-success-subtle"
            th:field="*{balanceAfter}"
            readonly
            style="background-color: #f8f9fa"
          />
        </div>

        <div class="col-md-12">
          <label class="form-label fw-bold">任務備註</label>
          <textarea
            class="form-control lockable"
            th:field="*{notes}"
            rows="1"
          ></textarea>
        </div>

        <div class="col-12 mt-4 d-flex justify-content-end gap-2">
          <!-- 返回與儲存按鈕 -->
          <a href="/" class="btn btn-secondary">返回列表</a>
          <button type="submit" class="btn btn-success" id="saveBtn">
            儲存變更
          </button>
        </div>
      </form>
    </div>

    <script th:inline="javascript">
      const isEdit = /*[[${isEdit}]]*/ false;
      const contractsJsonData =
        /*[[${contractsJson != null ? contractsJson : '{}'}]]*/ "{}";
      // 新約/續約 邏輯
      function handleRenew() {
        const contractInput = document.getElementById("contractNo");
        const priceInput = document.getElementById("contractUnitPrice");
        const hoursInput = document.getElementById("totalContractHours");
        const amountInput = document.getElementById("contractAmount");
        const eventInput = document.getElementById("caseFileNo");
        const balanceAfterInput = document.getElementById("balanceAfter");

        let currentBalance = 0;
        let original = "";

        original = contractInput.value.trim();

        // 1. 彈出對話框修改合約編號
        let newContractNo = "";
        while (true) {
          newContractNo = window.prompt("請輸入新的合約編號：", original);
          if (newContractNo === null) {
            return; // 使用者按下取消，不執行後續動作
          }
          newContractNo = newContractNo.trim();
          if (newContractNo === "") {
            alert("合約編號不可為空！");
            continue;
          }
          if (newContractNo === original) {
            alert("新合約編號不可與原合約編號相同，請重新輸入。");
            continue;
          }
          contractInput.value = newContractNo; // 套用新編號
          break; // 通過驗證，跳出迴圈
        }

        let newContractUnitPrice = 0;
        while (true) {
          newContractUnitPrice = window.prompt("請輸入新的合約單價：");
          if (newContractUnitPrice === null) {
            return; // 使用者取消，不執行後續動作
          }
          newContractUnitPrice = newContractUnitPrice.trim();
          if (newContractUnitPrice === "") {
            alert("合約單價不可為空！");
            continue;
          }
          priceInput.value = newContractUnitPrice; // 套用新金額
          break;
        }

        let newtotalContractHours = 0;
        while (true) {
          newtotalContractHours = window.prompt("請輸入新的合約總時數：");
          if (newtotalContractHours === null) {
            return; // 使用者取消，不執行後續動作
          }
          newtotalContractHours = newtotalContractHours.trim();
          if (newtotalContractHours === "") {
            alert("合約時數不可為空！");
            continue;
          }
          hoursInput.value = newtotalContractHours; // 套用新時數
          break;
        }

        // 2. 從快取資料中安全取出「欲續約合約」之前的累計餘額
        try {
          const contractsMap = JSON.parse(contractsJsonData);
          if (contractsMap[original]) {
            currentBalance =
              Math.round(parseFloat(contractsMap[original].contractBalance)) ||
              0;
          }
          // 3. 關鍵修正：新合約預算 = 新單價 + 舊合約剩餘，並設為「起始可用餘額」

          if (priceInput && amountInput) {
            const price = parseFloat(priceInput.value) || 0;
            const newTotal = price + currentBalance;
            amountInput.value = newTotal;

            const cbInput = document.getElementById("contractBalance");
            if (cbInput) cbInput.value = newTotal;
          }
        } catch (e) {
          console.error("續約解析餘額失敗", e);
        }

        calculateAllFees(); // 最後再重新計算一遍，確保結餘欄位刷新為合約原額

        if (balanceAfterInput) {
          balanceAfterInput.value = amountInput.value;
        }

        // 清空 憑證相關與費用相關欄位，確保結餘能對應到新的合約原額
        const clearIds = [
          "invoiceRequestNo",
          "actualReceived",
          "receiptDate",
          "paymentReceivedDate",
          "invoiceDate",
          "invoiceNo",
          "actualHours",
          "hoursFee",
          "eventFee",
          "totalFee",
          "totalInNtd",
        ];
        clearIds.forEach((id) => {
          const el = document.getElementById(id);
          if (el) el.value = "";
        });

        const withheldSelect = document.getElementById("isWithheld");
        if (withheldSelect) withheldSelect.value = "否";

        if (eventInput) {
          eventInput.value = "MainCase"; // 套用合約母案預設代碼
        }

        // 4. 自動打開「合約憑證」收合區塊 (僅在收合時點擊)
        document
          .querySelector('[data-bs-target="#receiptsSection"].collapsed')
          ?.click();
      }

      // 自動計算各項費用
      function calculateAllFees() {
        const amountStr = document.getElementById("contractUnitPrice").value;
        const hoursStr = document.getElementById("totalContractHours").value;
        const actHoursStr = document.getElementById("actualHours").value;
        const eventFeeStr = document.getElementById("eventFee").value;
        const rateInput = document.getElementById("hourlyRate");
        const hoursFeeInput = document.getElementById("hoursFee");
        const totalFeeInput = document.getElementById("totalFee");
        const totalInvoicedInput = document.getElementById("totalInvoiced");

        // 1. 小時費用
        let hourlyRateVal = 0;
        if (amountStr && hoursStr) {
          const amount = parseFloat(amountStr);
          const hours = parseFloat(hoursStr);
          if (hours !== 0 && !isNaN(amount) && !isNaN(hours)) {
            hourlyRateVal = Math.round(amount / hours);
            if (rateInput) rateInput.value = hourlyRateVal;
          } else {
            if (rateInput) rateInput.value = "";
          }
        } else {
          if (rateInput) rateInput.value = "";
        }

        // 2. 時數費用 = 實際使用時數 * 小時費用
        if (actHoursStr && rateInput && rateInput.value) {
          const actualHrs = parseFloat(actHoursStr);
          if (!isNaN(actualHrs)) {
            const hoursFeeVal =
              Math.round(actualHrs * hourlyRateVal * 100) / 100;
            if (hoursFeeInput) hoursFeeInput.value = hoursFeeVal;
          } else {
            if (hoursFeeInput) hoursFeeInput.value = "";
          }
        } else {
          if (hoursFeeInput) hoursFeeInput.value = "";
        }

        // 3.1 總費用-NTD(自動) = 時數費用 + 事件費用
        const hoursFee =
          parseFloat(document.getElementById("hoursFee")?.value) || 0;
        const eventFee =
          parseFloat(document.getElementById("eventFee")?.value) || 0;

        const totalFeeVal = hoursFee + eventFee;
        // const totalFeeVal = hoursFee + eventFee + serviceFee + pageFee + itemFee + customFee;
        if (totalFeeInput) {
          totalFeeInput.value = Math.round(totalFeeVal * 100) / 100;
        }

        // 3.1.1 結餘 = 合約餘額 - 總費用
        const startBalance =
          parseFloat(document.getElementById("contractBalance")?.value) || 0;
        const balanceAfterInput = document.getElementById("balanceAfter");
        if (balanceAfterInput) {
          balanceAfterInput.value =
            Math.round((startBalance - totalFeeVal) * 100) / 100;
        }
        // 3.2 收費合計 = 服務費 + 超頁費 + 超項費 + 自定義費

        const serviceFee =
          parseFloat(document.getElementById("serviceFee")?.value) || 0;
        const pageFee =
          parseFloat(document.getElementById("pageFee")?.value) || 0;
        const itemFee =
          parseFloat(document.getElementById("itemFee")?.value) || 0;
        const customFee =
          parseFloat(document.getElementById("customFee")?.value) || 0;

        const totalInvoiced = serviceFee + pageFee + itemFee + customFee;
        if (totalInvoicedInput) {
          totalInvoicedInput.value = Math.round(totalInvoiced * 100) / 100;
        }
        // 4. 稅額計算
        const taxRate =
          parseFloat(document.getElementById("taxRate")?.value) || 0;
        if (taxRate === 0) {
          if (document.getElementById("preTaxAmount"))
            document.getElementById("preTaxAmount").value = "";
          if (document.getElementById("salesTax"))
            document.getElementById("salesTax").value = "";
        } else {
          const preTaxAmount = Math.round(totalFeeVal / (1 + taxRate)); // 公式: 四捨五入(收費合計/(1+稅額))
          const salesTax = totalFeeVal - preTaxAmount; // 公式: 收費合計 - 未稅金額

          if (document.getElementById("preTaxAmount"))
            document.getElementById("preTaxAmount").value = preTaxAmount;
          if (document.getElementById("salesTax"))
            document.getElementById("salesTax").value = salesTax;
        }

        // 5. 合計NT
        const exchangeRate =
          parseFloat(document.getElementById("exchangeRate")?.value) || 1;
        if (document.getElementById("totalInNtd")) {
          document.getElementById("totalInNtd").value =
            Math.round(totalFeeVal * exchangeRate * 100) / 100;
        }
        console.log(balanceAfterInput.value);
      }

      document.addEventListener("DOMContentLoaded", function () {
        // 綁定所有會影響費用的輸入事件
        const inputs = [
          "contractAmount",
          "contractUnitPrice",
          "totalContractHours",
          "actualHours",
          "eventFee",
          "serviceFee",
          "pageFee",
          "itemFee",
          "customFee",
          "taxRate",
          "exchangeRate",
        ];
        inputs.forEach((id) => {
          const el = document.getElementById(id);
          if (el) el.addEventListener("input", calculateAllFees);
        });

        // 新增案件時：建立可查詢的滾動下拉選單與自動代入邏輯
        if (!isEdit && contractsJsonData && contractsJsonData !== "{}") {
          try {
            const contractsMap = JSON.parse(contractsJsonData);
            const contractInput = document.getElementById("contractNo");

            // 建立 datalist 作為下拉搜尋清單
            let datalist = document.createElement("datalist");
            datalist.id = "contractNoList";
            Object.keys(contractsMap).forEach((cNo) => {
              let option = document.createElement("option");
              option.value = cNo;
              datalist.appendChild(option);
            });
            document.body.appendChild(datalist);
            contractInput.setAttribute("list", "contractNoList");

            // 監聽合約編號輸入變更
            contractInput.addEventListener("input", function () {
              const selectedNo = contractInput.value;
              const balanceEl = document.getElementById("balanceDisplay");
              if (balanceEl) {
                balanceEl.innerText = "";
                balanceEl.style.display = "none"; // 恢復隱藏
              }

              if (contractsMap[selectedNo]) {
                const data = contractsMap[selectedNo];
                if (balanceEl && data.contractBalance !== undefined) {
                  const formattedBalance = Math.round(
                    data.contractBalance,
                  ).toLocaleString();
                  balanceEl.innerText =
                    "💰 合約餘額: " + formattedBalance + " 元";
                  balanceEl.style.display = "inline-block"; // 顯示金額

                  const cbInput = document.getElementById("contractBalance");
                  if (cbInput) cbInput.value = data.contractBalance || 0;
                }
                if (document.getElementById("appName") && data.appName)
                  document.getElementById("appName").value = data.appName;
                if (document.getElementById("applicant") && data.applicant)
                  document.getElementById("applicant").value = data.applicant;
                if (
                  document.getElementById("contractNotes") &&
                  data.contractNotes
                )
                  document.getElementById("contractNotes").value =
                    data.contractNotes;
                if (
                  document.getElementById("contractUnitPrice") &&
                  data.contractUnitPrice
                )
                  document.getElementById("contractUnitPrice").value =
                    data.contractUnitPrice;
                if (
                  document.getElementById("contractAmount") &&
                  data.contractAmount
                )
                  document.getElementById("contractAmount").value =
                    data.contractAmount;
                if (
                  document.getElementById("totalContractHours") &&
                  data.totalContractHours
                )
                  document.getElementById("totalContractHours").value =
                    data.totalContractHours;

                if (
                  document.getElementById("invoiceRequestNo") &&
                  data.invoiceRequestNo !== undefined
                )
                  document.getElementById("invoiceRequestNo").value =
                    data.invoiceRequestNo;
                if (
                  document.getElementById("actualReceived") &&
                  data.actualReceived !== undefined
                )
                  document.getElementById("actualReceived").value =
                    data.actualReceived;
                if (
                  document.getElementById("receiptDate") &&
                  data.receiptDate !== undefined
                )
                  document.getElementById("receiptDate").value =
                    data.receiptDate;
                if (
                  document.getElementById("paymentReceivedDate") &&
                  data.paymentReceivedDate !== undefined
                )
                  document.getElementById("paymentReceivedDate").value =
                    data.paymentReceivedDate;
                if (
                  document.getElementById("isWithheld") &&
                  data.isWithheld !== undefined
                )
                  document.getElementById("isWithheld").value = data.isWithheld;
                if (
                  document.getElementById("invoiceDate") &&
                  data.invoiceDate !== undefined
                )
                  document.getElementById("invoiceDate").value =
                    data.invoiceDate;
                if (
                  document.getElementById("invoiceNo") &&
                  data.invoiceNo !== undefined
                )
                  document.getElementById("invoiceNo").value = data.invoiceNo;
                if (
                  document.getElementById("invoiceNote") &&
                  data.invoiceNote !== undefined
                )
                  document.getElementById("invoiceNote").value =
                    data.invoiceNote;

                // 自動重算各項費用
                calculateAllFees();
              }
            });
          } catch (e) {
            console.error("無法解析歷史合約資料", e);
          }
        }

        if (isEdit) {
          // 如果是現有資料的檢視模式，鎖定所有帶有 lockable class 的輸入框並隱藏儲存按鈕
          document.querySelectorAll(".lockable").forEach((el) => {
            el.disabled = true;
            el.classList.add("bg-light");
          });
          document.getElementById("saveBtn").style.display = "none";
        }
      });

      // 點擊「編輯」按鈕後觸發
      function enableEdit() {
        document.querySelectorAll(".lockable").forEach((el) => {
          el.disabled = false;
          el.classList.remove("bg-light");
        });
        document.getElementById("saveBtn").style.display = "inline-block";
        document.getElementById("editBtn").style.display = "none"; // 隱藏編輯按鈕

        // 將焦點自動移到第一個輸入框
        const firstInput = document.querySelector(".lockable");
        if (firstInput) firstInput.focus();
      }
