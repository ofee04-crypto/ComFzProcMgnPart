<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/nav :: head('新增/編輯案件')}"></head>
<body>
<div th:replace="~{fragments/nav :: navbar}"></div>

<div class="container mt-4 mb-5">
    <h2 class="mb-4" th:text="${isEdit ? '編輯案件' : '新增案件'}">新增案件</h2>
    
    <form th:action="@{/save}" th:object="${patentCase}" method="post" class="row g-3">
        <input type="hidden" th:field="*{eventNo}" />
        
        <div class="col-md-4">
            <label class="form-label">合約編號</label>
            <input type="text" class="form-control" th:field="*{contractNo}">
        </div>
        <div class="col-md-4">
            <label class="form-label">申請人</label>
            <input type="text" class="form-control" th:field="*{applicant}">
        </div>
        <div class="col-md-4">
            <label class="form-label">承辦人</label>
            <input type="text" class="form-control" th:field="*{assignee}">
        </div>
        
        <div class="col-md-6">
            <label class="form-label">申請名稱</label>
            <input type="text" class="form-control" th:field="*{appName}" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">案件/檔案編號</label>
            <input type="text" class="form-control" th:field="*{caseFileNo}">
        </div>

        <div class="col-md-6">
            <label class="form-label">申請案名稱(英)</label>
            <input type="text" class="form-control" th:field="*{appNameEn}">
        </div>
        <div class="col-md-6">
            <label class="form-label">案件原文名稱</label>
            <input type="text" class="form-control" th:field="*{originalCaseName}">
        </div>

        <div class="col-md-12">
            <label class="form-label">合約備註</label>
            <textarea class="form-control" th:field="*{contractNotes}" rows="2"></textarea>
        </div>

        <div class="col-md-4">
            <label class="form-label">合約金額</label>
            <input type="number" step="0.01" class="form-control" th:field="*{contractAmount}">
        </div>
        <div class="col-md-4">
            <label class="form-label">合約總時數</label>
            <input type="number" step="0.01" class="form-control" th:field="*{totalContractHours}">
        </div>
        <div class="col-md-4">
            <label class="form-label">小時費用</label>
            <input type="number" step="0.01" class="form-control" th:field="*{hourlyRate}">
        </div>

        <div class="col-md-4">
            <label class="form-label">事件發生日</label>
            <input type="date" class="form-control" th:field="*{eventDate}">
        </div>
        <div class="col-md-8">
            <label class="form-label">事件內容</label>
            <input type="text" class="form-control" th:field="*{eventContent}">
        </div>

        <div class="col-md-4">
            <label class="form-label">委派日期</label>
            <input type="date" class="form-control" th:field="*{assignmentDate}">
        </div>
        <div class="col-md-4">
            <label class="form-label">預計完成日</label>
            <input type="date" class="form-control" th:field="*{expectedCompletionDate}">
        </div>
        <div class="col-md-4">
            <label class="form-label">實際完成日 / 完成日期</label>
            <input type="date" class="form-control" th:field="*{actualCompletionDate}">
        </div>

        <div class="col-md-6">
            <label class="form-label">任務名稱</label>
            <input type="text" class="form-control" th:field="*{taskName}">
        </div>
        <div class="col-md-6">
            <label class="form-label">工作項目簡述</label>
            <input type="text" class="form-control" th:field="*{taskDescription}">
        </div>

        <div class="col-md-4">
            <label class="form-label">預計使用時數</label>
            <input type="number" step="0.01" class="form-control" th:field="*{expectedHours}">
        </div>
        <div class="col-md-4">
            <label class="form-label">實際使用時數</label>
            <input type="number" step="0.01" class="form-control" th:field="*{actualHours}">
        </div>
        <div class="col-md-4">
            <label class="form-label">結餘時數</label>
            <input type="number" step="0.01" class="form-control" th:field="*{remainingHours}">
        </div>

        <div class="col-md-12">
            <label class="form-label">備註</label>
            <textarea class="form-control" th:field="*{notes}" rows="2"></textarea>
        </div>

        <div class="col-12 mt-4">
            <button type="submit" class="btn btn-success">儲存</button>
            <a href="/" class="btn btn-secondary">返回列表</a>
        </div>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
