<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments/nav :: head('案件調閱與搜尋')}"></head>

  <body>
    <div th:replace="~{fragments/nav :: navbar}"></div>

    <style>
      /* 限制列表高度與導覽列固定CSS */
      .table-responsive thead th {
        position: sticky !important;
        top: -15px;
        z-index: 1020;
        background-color: #dddddd !important;
      }
      .table-responsive {
        max-height: calc(90vh - 230px);
        overflow-y: auto;
      }
      /* 表格緊湊CSS */
      .table-compact {
        font-size: 0.85rem;
      }
      .table-compact th,
      .table-compact td {
        padding: 4px 8px !important;
        white-space: nowrap;
      }
    </style>
    <div class="container-fluid mt-4 px-4">
      <h2 class="mb-4">案件調閱與搜尋</h2>
      <!-- 操作訊息 -->
      <div
        th:if="${message}"
        class="alert alert-success mt-3"
        th:text="${message}"
      ></div>

      <form method="get" action="/" class="row g-3 align-items-center mb-4">
        <div class="col-auto">
          <input
            type="text"
            class="form-control"
            name="keyword"
            th:value="${keyword}"
            placeholder="輸入關鍵字..."
          />
        </div>
        <div class="col-auto d-flex align-items-center">
          <label class="me-2 fw-bold text-secondary">From </label>
          <input
            type="date"
            class="form-control"
            name="startDate"
            th:value="${startDate}"
          />
          <span class="mx-2 text-secondary fw-bold">To </span>
          <input
            type="date"
            class="form-control"
            name="endDate"
            th:value="${endDate}"
          />
        </div>
        <div class="col d-flex justify-content-between align-items-end">
          <div>
            <button type="submit" class="btn btn-primary">搜尋</button>
            <a href="/" class="btn btn-secondary">清除</a>
          </div>
          <button type="submit" formaction="/export" class="btn btn-success">
            匯出 Excel
          </button>
        </div>
      </form>
      <!-- 分頁控制列 -->
      <div
        id="paginationContainer"
        class="d-flex justify-content-between align-items-center mt-3"
      >
        <div id="pageInfo" class="text-secondary"></div>
        <div class="d-flex gap-2 align-items-center">
          <button
            id="prevBtn"
            class="btn btn-sm btn-outline-secondary"
            onclick="prevPage()"
          >
            上一頁
          </button>

          <!-- 頁碼按鈕容器 -->
          <div id="pageItemWrapper" class="d-flex gap-1"></div>

          <button
            id="nextBtn"
            class="btn btn-sm btn-outline-secondary"
            onclick="nextPage()"
          >
            下一頁
          </button>

          <div class="input-group input-group-sm ms-3" style="width: 130px">
            <input
              type="number"
              id="jumpPageInput"
              class="form-control"
              placeholder="頁碼"
              min="1"
            />
            <button
              class="btn btn-outline-secondary"
              type="button"
              onclick="jumpPage()"
            >
              跳轉
            </button>
          </div>
        </div>
      </div>
      <div class="table-responsive">
        <table
          class="table table-bordered table-hover align-middle table-sm table-compact"
          style="min-width: 1600px"
        >
          <thead class="table-light">
            <tr>
              <!-- <th>事件編號</th> -->
              <th class="text-center">操作</th>
              <th class="text-center">合約編號</th>
              <th class="text-center">合約名稱</th>
              <th class="text-center">案件/檔案編號</th>
              <th class="text-center">任務名稱</th>
              <th class="text-center">工作項目簡述</th>
              <th class="text-center">任務委派日</th>
              <th class="text-center">預計完成日</th>
              <th class="text-center">預計時數</th>
              <th class="text-center">實際完成日</th>
              <th class="text-center">實際時數</th>
              <th class="text-center">時數費用</th>
              <th class="text-center">事件費用</th>
              <th class="text-center">結餘</th>
              <th class="text-center">承辦人</th>
              <th class="text-center">備註</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="case : ${cases}" class="case-row">
              <!-- <td th:text="${case.eventNo}"></td> -->
              <td class="text-center">
                <a
                  th:href="@{/edit/{id}(id=${case.eventNo})}"
                  class="btn btn-sm btn-outline-primary"
                  >詳</a
                >
                <form
                  th:action="@{/delete/{id}(id=${case.eventNo})}"
                  method="post"
                  class="d-inline"
                >
                  <button
                    type="submit"
                    class="btn btn-sm btn-outline-danger"
                    onclick="return confirm('確定刪除？');"
                  >
                    刪
                  </button>
                </form>
              </td>
              <td th:text="${case.contractNo}"></td>
              <td th:text="${case.appName}"></td>

              <td th:text="${case.caseFileNo}"></td>
              <td th:text="${case.taskName}"></td>
              <td th:text="${case.taskDescription}"></td>
              <td th:text="${case.assignmentDate}"></td>
              <td th:text="${case.expectedCompletionDate}"></td>
              <td
                class="text-end"
                th:text="${case.expectedHours != null ? #numbers.formatDecimal(case.expectedHours, 1, 'COMMA', 1, 'POINT') : ''}"
              ></td>
              <td th:text="${case.actualCompletionDate}"></td>
              <td
                class="text-end"
                th:text="${case.actualHours != null ? #numbers.formatDecimal(case.actualHours, 1, 'COMMA', 1, 'POINT') : ''}"
              ></td>
              <td
                class="text-end"
                th:text="${case.hoursFee != null ? #numbers.formatDecimal(case.hoursFee, 1, 'COMMA', 1, 'POINT') : ''}"
              ></td>
              <td
                class="text-end"
                th:text="${case.eventFee != null ? #numbers.formatDecimal(case.eventFee, 1, 'COMMA', 1, 'POINT') : ''}"
              ></td>
              <td
                class="text-end"
                th:text="${case.balanceAfter != null ? #numbers.formatDecimal(case.balanceAfter, 1, 'COMMA', 1, 'POINT') : ''}"
              ></td>
              <td th:text="${case.assignee}"></td>
              <td th:text="${case.notes}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(cases)}">
              <td colspan="7" class="text-center">目前無案件資料</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:inline="javascript">
      let currentPage = 1;
      const pageSize = 500;

      function renderTable() {
        const rows = document.querySelectorAll(".case-row");
        const start = (currentPage - 1) * pageSize;
        const end = start + pageSize;

        rows.forEach((row, index) => {
          if (index >= start && index < end) {
            row.style.display = "table-row";
          } else {
            row.style.display = "none";
          }
        });

        updatePaginationControls(rows.length);
      }

      function updatePaginationControls(totalItems) {
        const totalPages = Math.ceil(totalItems / pageSize) || 1;
        if (currentPage > totalPages) currentPage = totalPages;

        const startItem =
          totalItems === 0 ? 0 : (currentPage - 1) * pageSize + 1;
        const endItem = Math.min(currentPage * pageSize, totalItems);
        document.getElementById("pageInfo").innerText =
          `顯示第 ${startItem} 至 ${endItem} 筆，共 ${totalItems} 筆`;

        const wrapper = document.getElementById("pageItemWrapper");
        wrapper.innerHTML = "";

        let startPage = Math.max(1, currentPage - 2);
        let endPage = Math.min(totalPages, startPage + 4);
        if (endPage - startPage < 4) startPage = Math.max(1, endPage - 4);

        for (let i = startPage; i <= endPage; i++) {
          const btn = document.createElement("button");
          // 修正樣式類別
          btn.className = `btn btn-sm ${i === currentPage ? "btn-primary" : "btn-outline-secondary"}`;
          btn.innerText = i;
          btn.onclick = () => {
            currentPage = i;
            renderTable();
          };
          wrapper.appendChild(btn);
        }

        document.getElementById("prevBtn").disabled = currentPage === 1;
        document.getElementById("nextBtn").disabled =
          currentPage === totalPages;
      }

      function prevPage() {
        if (currentPage > 1) {
          currentPage--;
          renderTable();
        }
      }
      function nextPage() {
        const rows = document.querySelectorAll(".case-row");
        const totalPages = Math.ceil(rows.length / pageSize);
        if (currentPage < totalPages) {
          currentPage++;
          renderTable();
        }
      }
      function jumpPage() {
        const input = document.getElementById("jumpPageInput");
        const page = parseInt(input.value);
        const rows = document.querySelectorAll(".case-row");
        const totalPages = Math.ceil(rows.length / pageSize);
        if (page >= 1 && page <= totalPages) {
          currentPage = page;
          renderTable();
          input.value = "";
        } else {
          alert("無效的頁碼！");
        }
      }

      document.addEventListener("DOMContentLoaded", renderTable);
    </script>
  </body>
</html>
