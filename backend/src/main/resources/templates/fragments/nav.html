<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:fragment="head(title)">
    <meta charset="UTF-8" />
    <title th:text="${title}">FZ合約管理模組</title>
    <link rel="icon" type="image/png" th:href="@{/images/TitleIcon.png}" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        padding-top: 60px;
      }
    </style>
  </head>
  <body>
    <nav
      th:fragment="navbar"
      class="navbar navbar-expand-md navbar-dark bg-dark fixed-top"
    >
      <div class="container-fluid">
        <a class="navbar-brand text-center" href="/">
          <img
            th:src="@{/images/TitleIcon.png}"
            alt="Logo"
            width="35"
            height="35"
            class="d-inline-block align-text-top me-2"
          />
          FZ合約管理模組
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarsExampleDefault"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarsExampleDefault">
          <ul class="navbar-nav me-auto mb-2 mb-md-0">
            <li class="nav-item">
              <a class="nav-link" href="/">首頁/ 調閱</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/create">新增案件</a>
            </li>
            <!-- <li class="nav-item">
              <a class="nav-link" href="/overview">案件總覽</a>
            </li> -->
            <li class="nav-item">
              <a class="nav-link" href="/grouped">合約統計</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/logs">操作紀錄</a>
            </li>
            <li class="nav-item" th:if="${session.loggedInRole == 'ADMIN'}">
              <a class="nav-link" href="/users">帳號管理</a>
            </li>
            <li
              class="nav-item"
              th:if="${session.loggedInRole == 'ADMIN'||session.loggedInRole == 'MGN'}"
            >
              <a class="nav-link" href="/backup">資料備份</a>
            </li>
          </ul>
          <span class="navbar-text me-3" th:if="${username != null}">
            歡迎, <strong th:text="${username}">User</strong>!
          </span>
          <a
            th:if="${username != null}"
            class="btn btn-outline-light me-2"
            href="/logout"
            >登出</a
          >
          <button class="btn btn-outline-danger" onclick="shutdownSystem()">
            結束系統
          </button>
        </div>
      </div>
      <script>
        function shutdownSystem() {
          if (confirm("確定要關閉管理系統嗎？")) {
            fetch("/api/system/shutdown", { method: "POST" }).then((r) => {
              document.body.innerHTML =
                '<div class="container mt-5"><h1>系統已關閉，請直接關閉此瀏覽器視窗。</h1></div>';
            });
          }
        }
      </script>
    </nav>
  </body>
</html>
