<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>系統登入</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
    </style>
</head>
<body>
<div class="login-box">
    <h3 class="text-center mb-4">地端專利案件系統</h3>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <form th:action="@{/doLogin}" method="post">
        <div class="mb-3">
            <label class="form-label">帳號</label>
            <input type="text" name="username" class="form-control" placeholder="預設: admin" required autofocus>
        </div>
        <div class="mb-3">
            <label class="form-label">密碼</label>
            <input type="password" name="password" class="form-control" placeholder="預設: 123456" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">登入</button>
    </form>
</div>
</body>
</html>
